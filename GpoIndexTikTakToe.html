<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gpo Tik Tak Toe</title>
    <link rel="stylesheet" href="GpoTikTakToeStyle.css">
</head>
<body>
    <h1>Tic Tac Toe</h1>
    <div class="info-panel">
        <div class="names">
        
            <label>Player X: <input type=" text" id="nameX" placeholder="Enter name for X" value=" Player X"></label>
                    
            <label>Player O: <input type=" text" id="nameO" placeholder="Enter name for O" value=" Player O"></label>
             
                <button id="enterNameBtn">Enter Names</button>
    </div>
    <div class="timer">
        Time: <span id="timerDisplay">0</span> seconds
    </div>
    </div>

       <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>
    <button id="restartButton">Restart Game</button>
    <script src="GpoTikTakToe.js"></script>



</body>
</html>
