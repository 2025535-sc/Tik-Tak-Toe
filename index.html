<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tic Tac Toe</title>
  <style>
    body { font-family: Arial; text-align: center; }
    .grid { display: grid; grid-template-columns: repeat(3, 100px); gap: 5px; justify-content: center; margin: 20px; }
    .cell { width: 100px; height: 100px; font-size: 2rem; cursor: pointer; }
    .disabled { pointer-events: none; opacity: 0.6; }
    .info { margin: 10px; }
  </style>
</head>
<body>

<h1>Tic Tac Toe</h1>

<div class="info">
  <input id="nameInput" placeholder="Enter player name">
  <button id="addName">Add Name</button>
</div>

<div class="info">
  <p>X: <span id="playerX">-</span> | Score: <span id="scoreX">0</span></p>
  <p>O: <span id="playerO">-</span> | Score: <span id="scoreO">0</span></p>
  <p>Draws: <span id="draws">0</span></p>
</div>

<div class="info">
  <p>Turn: <span id="turn">X</span></p>
  <p>Time: <span id="time">0</span>s</p>
</div>

<div id="grid" class="grid disabled"></div>

<button id="restart">Restart</button>

<script src="Tik Tak Toe.js"></script>
</body>
</html>
